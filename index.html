<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es Paloma Ahora</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0b1220;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button{
    background:#e11d48;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    width:100%;
    font-size:18px;
    font-weight:bold;
}

canvas{
    width:100%;
    max-width:400px;
    margin-top:20px;
    border-radius:15px;
}

</style>

</head>
<body>

<div class="container">

<h1>ES PALOMA AHORA</h1>

<input type="text" id="nombre" placeholder="Escribe tu nombre">

<input type="file" id="foto" accept="image/*">

<button onclick="generarImagen()">
Generar Imagen
</button>

<br><br>

<canvas id="canvas" width="1080" height="1920"></canvas>

<br><br>

<button id="descargar" style="display:none">
Descargar Imagen
</button>

</div>

<script>

function generarImagen(){

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const nombre=document.getElementById("nombre").value;
const archivo=document.getElementById("foto").files[0];

if(!archivo){
alert("Sube una foto");
return;
}

const lector=new FileReader();

lector.onload=function(e){

const foto=new Image();

foto.onload=function(){

ctx.clearRect(0,0,1080,1920);

// Ajustar la foto sin deformarla
const escala=Math.max(
1080/foto.width,
1920/foto.height
);

const nuevoAncho=foto.width*escala;
const nuevoAlto=foto.height*escala;

const x=(1080-nuevoAncho)/2;
const y=(1920-nuevoAlto)/2;

ctx.drawImage(
foto,
x,
y,
nuevoAncho,
nuevoAlto
);

const marco=new Image();

marco.onload=function(){

ctx.drawImage(
marco,
0,
0,
1080,
1920
);

ctx.fillStyle="white";
ctx.textAlign="center";
ctx.font="bold 62px Arial";

ctx.fillText(
"SOY " + nombre.toUpperCase(),
540,
1380
);

ctx.fillText(
"Y MI VOTO ES POR",
540,
1460
);

ctx.fillText(
"LA FÓRMULA QUE",
540,
1540
);

ctx.fillText(
"LE SUMA AL PAÍS",
540,
1620
);

document.getElementById("descargar").style.display="block";

};

marco.src="./marco.png?v=" + Date.now();

};

foto.src=e.target.result;

};

lector.readAsDataURL(archivo);

}


document.getElementById("descargar").onclick=function(){

const enlace=document.createElement("a");

enlace.download="es-paloma-ahora.jpg";

enlace.href=document.getElementById("canvas").toDataURL("image/jpeg",1);

enlace.click();

}

</script>

</body>
</html>
